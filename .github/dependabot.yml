version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      circuit-dependencies:
        patterns:
          - "circomlib"
          - "snarkjs"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      frontend-stellar-zk:
        patterns:
          - "@stellar/*"
          - "buffer"
          - "snarkjs"

  - package-ecosystem: "npm"
    directory: "/sdk"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      sdk-stellar-zk:
        patterns:
          - "@stellar/*"
          - "buffer"
          - "snarkjs"

  - package-ecosystem: "npm"
    directory: "/sdk/bindings"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      sdk-bindings-stellar:
        patterns:
          - "@stellar/*"
          - "buffer"

  - package-ecosystem: "cargo"
    directory: "/contracts/agent-passport-validator"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      soroban-sdk:
        patterns:
          - "soroban-sdk"
